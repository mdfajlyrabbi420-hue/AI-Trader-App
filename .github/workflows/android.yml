name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Initialize Android Project Structure
      run: |
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/java/com/ai/trader
        
        # ফাইলগুলো সঠিক গ্রেডল স্ট্রাকচারে সরানো
        mv AndroidManifest.xml app/src/main/AndroidManifest.xml
        mv res/layout/activity_main.xml app/src/main/res/layout/activity_main.xml
        mv src/com/ai/trader/* app/src/main/java/com/ai/trader/ || true
        
        # বিল্ড স্ক্রিপ্ট (build.gradle) তৈরি করা
        cat <<EOF > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.2.2'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF

        # অ্যাপ লেভেলের build.gradle তৈরি করা
        cat <<EOF > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.ai.trader'
            compileSdk 34
            defaultConfig {
                applicationId "com.ai.trader"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        EOF

        # settings.gradle তৈরি করা
        echo "include ':app'" > settings.gradle

    - name: Build with Gradle (Assemble Debug APK)
      run: |
        gradle wrapper --gradle-version 8.5
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: neo-ai-trader-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
